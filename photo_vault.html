<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: white;
        }

        /* ===== PIN LOCK PAGE ===== */
        .page {
            display: none;
            min-height: 100vh;
            width: 100%;
        }

        .page.active {
            display: flex;
        }

        .lock-page {
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .lock-container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(34, 211, 238, 0.4);
            border-radius: 30px;
            padding: 60px 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .lock-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
        }

        .lock-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .lock-subtitle {
            color: #06b6d4;
            font-size: 13px;
            margin-bottom: 40px;
            letter-spacing: 1px;
            font-weight: 300;
        }

        .pin-input-label {
            display: block;
            font-size: 12px;
            color: rgba(6, 182, 212, 0.7);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        #pinInput {
            width: 100%;
            padding: 20px;
            font-size: 40px;
            letter-spacing: 15px;
            text-align: center;
            border: 2px solid rgba(34, 211, 238, 0.5);
            border-radius: 15px;
            background: rgba(51, 65, 85, 0.5);
            color: white;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        #pinInput:focus {
            outline: none;
            border-color: #22d3ee;
            background: rgba(51, 65, 85, 0.8);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
        }

        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #475569;
            transition: all 0.3s ease;
        }

        .pin-dot.active {
            background: #22d3ee;
            box-shadow: 0 0 12px rgba(34, 211, 238, 0.6);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 20px;
            min-height: 20px;
            font-weight: 500;
        }

        #unlockButton {
            width: 100%;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(6, 182, 212, 0.3);
        }

        #unlockButton:hover:not(:disabled) {
            background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);
            box-shadow: 0 12px 32px rgba(6, 182, 212, 0.5);
            transform: translateY(-2px);
        }

        #unlockButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== GALLERY PAGE ===== */
        .gallery-page {
            flex-direction: column;
            padding: 40px 20px;
        }

        .gallery-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .gallery-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .title-icon {
            font-size: 28px;
        }

        .lock-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .lock-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            border-color: rgba(239, 68, 68, 0.8);
        }

        /* Add Photo Section */
        .add-photo-section {
            margin-bottom: 50px;
        }

        .add-photo-box {
            background: rgba(30, 41, 59, 0.5);
            border: 2px dashed rgba(34, 211, 238, 0.5);
            border-radius: 20px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .add-photo-box:hover {
            border-color: #22d3ee;
            background: rgba(30, 41, 59, 0.8);
        }

        .add-photo-box input {
            display: none;
        }

        .add-photo-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        .add-photo-text {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .add-photo-subtext {
            color: rgba(34, 211, 238, 0.6);
            font-size: 14px;
        }

        /* Gallery */
        .gallery-section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            font-size: 22px;
            font-weight: 700;
        }

        .title-line {
            width: 4px;
            height: 22px;
            background: linear-gradient(180deg, #22d3ee 0%, #a855f7 100%);
            border-radius: 2px;
        }

        .photo-count {
            color: #22d3ee;
            font-size: 18px;
        }

        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: rgba(148, 163, 184, 0.8);
            font-size: 16px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .photo-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(34, 211, 238, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(30, 41, 59, 0.3);
            aspect-ratio: 1;
        }

        .photo-item:hover {
            border-color: rgba(34, 211, 238, 0.6);
            transform: translateY(-4px);
        }

        .photo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 12px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .photo-item:hover .photo-overlay {
            opacity: 1;
            background: rgba(0, 0, 0, 0.4);
        }

        .photo-details {
            font-size: 12px;
        }

        .photo-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
        }

        .photo-date {
            color: rgba(148, 163, 184, 0.8);
            font-size: 11px;
            margin-top: 4px;
        }

        .delete-photo-btn {
            background: rgba(239, 68, 68, 0.8);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .delete-photo-btn:hover {
            background: rgba(239, 68, 68, 1);
        }

        /* Lightbox Modal */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 2000;
        }

        .lightbox.show {
            display: flex;
        }

        .lightbox-content {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 16px;
            padding: 24px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .lightbox-img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .lightbox-name {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .lightbox-date {
            color: rgba(6, 182, 212, 0.6);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .lightbox-close-btn {
            width: 100%;
            padding: 10px;
            background: rgba(34, 211, 238, 0.2);
            border: 1px solid rgba(34, 211, 238, 0.5);
            color: #22d3ee;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .lightbox-close-btn:hover {
            background: rgba(34, 211, 238, 0.3);
        }
    </style>
</head>
<body>

    <!-- ===== PIN LOCK PAGE ===== -->
    <div class="page lock-page active" id="lockPage">
        <div class="lock-container">
            <span class="lock-icon">🔒</span>
            <h1 class="lock-title">VAULT</h1>
            <p class="lock-subtitle">Secure Photo Storage</p>

            <label class="pin-input-label">Enter PIN</label>
            <input 
                type="password" 
                id="pinInput" 
                placeholder="••••" 
                maxlength="4"
                autocomplete="off"
            >

            <div class="pin-dots">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <button id="unlockButton" disabled>Unlock Vault</button>
        </div>
    </div>

    <!-- ===== GALLERY PAGE ===== -->
    <div class="page gallery-page" id="galleryPage">
        <div class="gallery-container">
            <div class="gallery-header">
                <div class="gallery-title">
                    <span class="title-icon">🔓</span>
                    VAULT
                </div>
                <button class="lock-btn" onclick="goToLock()">🔒 Lock Vault</button>
            </div>

            <!-- Add Photo Section -->
            <div class="add-photo-section">
                <label class="add-photo-box" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" multiple accept="image/*">
                    <span class="add-photo-icon">⬆️</span>
                    <div class="add-photo-text">Add Photo</div>
                    <div class="add-photo-subtext">Drag and drop or click to select images</div>
                </label>
            </div>

            <!-- Gallery Section -->
            <div>
                <div class="gallery-section-title">
                    <div class="title-line"></div>
                    <span>Your Photos</span>
                    <span class="photo-count" id="photoCount"></span>
                </div>

                <div id="emptyMessage" class="empty-message">
                    No photos yet. Add your first photo above! 📸
                </div>

                <div class="gallery-grid" id="gallery"></div>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <img id="lightboxImage" class="lightbox-img">
            <div class="lightbox-name" id="lightboxName"></div>
            <div class="lightbox-date" id="lightboxDate"></div>
            <button class="lightbox-close-btn" onclick="closeLightbox()">Close</button>
        </div>
    </div>

    <script>
        const CORRECT_PIN = '9009';
        let photos = [];

        // ===== PIN VALIDATION =====
        const pinInput = document.getElementById('pinInput');
        const pinDots = document.querySelectorAll('.pin-dot');
        const unlockButton = document.getElementById('unlockButton');
        const errorMessage = document.getElementById('errorMessage');

        pinInput.addEventListener('input', (e) => {
            // Only allow numbers
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 4);

            // Update dots
            pinDots.forEach((dot, index) => {
                if (index < e.target.value.length) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });

            // Enable button only when 4 digits entered
            unlockButton.disabled = e.target.value.length !== 4;
        });

        unlockButton.addEventListener('click', () => {
            if (pinInput.value === CORRECT_PIN) {
                // Go to gallery page
                document.getElementById('lockPage').classList.remove('active');
                document.getElementById('galleryPage').classList.add('active');
                pinInput.value = '';
                errorMessage.textContent = '';
                loadPhotos();
            } else {
                // Show error
                errorMessage.textContent = '❌ Invalid PIN. Try again.';
                pinInput.value = '';
                pinDots.forEach(dot => dot.classList.remove('active'));
                unlockButton.disabled = true;
                setTimeout(() => {
                    errorMessage.textContent = '';
                }, 3000);
            }
        });

        // ===== FILE UPLOAD =====
        const fileInput = document.getElementById('fileInput');

        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files) {
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const photo = {
                            id: Date.now() + Math.random(),
                            src: event.target.result,
                            name: file.name,
                            timestamp: new Date().toLocaleString()
                        };
                        photos.unshift(photo);
                        savePhotos();
                        renderGallery();
                    };
                    reader.readAsDataURL(file);
                });
            }
            fileInput.value = ''; // Reset input
        });

        // Drag and drop
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files) {
                fileInput.files = files;
                const event = new Event('change', { bubbles: true });
                fileInput.dispatchEvent(event);
            }
        });

        // ===== PHOTO MANAGEMENT =====
        function savePhotos() {
            localStorage.setItem('vaultPhotos', JSON.stringify(photos));
        }

        function loadPhotos() {
            const saved = localStorage.getItem('vaultPhotos');
            if (saved) {
                photos = JSON.parse(saved);
            }
            renderGallery();
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            const emptyMessage = document.getElementById('emptyMessage');
            const photoCount = document.getElementById('photoCount');

            if (photos.length === 0) {
                gallery.innerHTML = '';
                emptyMessage.style.display = 'block';
                photoCount.textContent = '';
            } else {
                emptyMessage.style.display = 'none';
                photoCount.textContent = `(${photos.length})`;
                gallery.innerHTML = photos.map(photo => `
                    <div class="photo-item" onclick="openLightbox('${photo.id}')">
                        <img src="${photo.src}" class="photo-img" alt="${photo.name}">
                        <div class="photo-overlay">
                            <div class="photo-details">
                                <div class="photo-name">${photo.name}</div>
                                <div class="photo-date">${photo.timestamp}</div>
                            </div>
                            <button class="delete-photo-btn" onclick="event.stopPropagation(); deletePhoto('${photo.id}')">🗑️</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function deletePhoto(id) {
            photos = photos.filter(p => p.id !== parseFloat(id));
            savePhotos();
            renderGallery();
        }

        function openLightbox(id) {
            const photo = photos.find(p => p.id === parseFloat(id));
            if (photo) {
                document.getElementById('lightboxImage').src = photo.src;
                document.getElementById('lightboxName').textContent = photo.name;
                document.getElementById('lightboxDate').textContent = photo.timestamp;
                document.getElementById('lightbox').classList.add('show');
            }
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('show');
        }

        function goToLock() {
            document.getElementById('galleryPage').classList.remove('active');
            document.getElementById('lockPage').classList.add('active');
            pinInput.value = '';
            errorMessage.textContent = '';
            photos = [];
        }

        // Close lightbox when clicking outside
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') {
                closeLightbox();
            }
        });
    </script>

</body>
</html>
